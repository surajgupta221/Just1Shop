<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Address - Just1Shop Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1 class="logo">🛍️ Just1Shop Admin</h1>
            <nav class="nav-menu">
                <a href="/">Dashboard</a>
                <a href="/addresses">Back to Addresses</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h1>📍 Add New Address</h1>

            {% if message %}
            <div class="alert alert-success">{{ message }}</div>
            {% endif %}

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" class="form-grid">
                <div class="form-group">
                    <label for="receiverName">Receiver Name *</label>
                    <input type="text" id="receiverName" name="receiverName" required placeholder="Full name">
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number *</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="+91 9876543210">
                </div>

                <div class="form-group">
                    <label for="addressType">Address Type *</label>
                    <select id="addressType" name="addressType" required>
                        <option value="">Select Type</option>
                        <option value="home">Home</option>
                        <option value="work">Work</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="addressLine1">Address Line 1 *</label>
                    <input type="text" id="addressLine1" name="addressLine1" required placeholder="Flat/House number and building name">
                </div>

                <div class="form-group full-width">
                    <label for="addressLine2">Address Line 2</label>
                    <input type="text" id="addressLine2" name="addressLine2" placeholder="Area, ward, or sector">
                </div>

                <div class="form-group full-width">
                    <label for="landmark">Landmark</label>
                    <input type="text" id="landmark" name="landmark" placeholder="Nearby landmark (optional)">
                </div>

                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required placeholder="Delhi">
                </div>

                <div class="form-group">
                    <label for="state">State *</label>
                    <input type="text" id="state" name="state" required placeholder="Delhi">
                </div>

                <div class="form-group">
                    <label for="pincode">Pincode *</label>
                    <input type="text" id="pincode" name="pincode" required placeholder="110001">
                </div>

                <div class="form-group">
                    <label for="country">Country *</label>
                    <input type="text" id="country" name="country" required placeholder="India" value="India">
                </div>

                <div class="form-group">
                    <label for="latitude">Latitude</label>
                    <input type="number" id="latitude" name="latitude" step="0.0001" placeholder="28.6139">
                </div>

                <div class="form-group">
                    <label for="longitude">Longitude</label>
                    <input type="number" id="longitude" name="longitude" step="0.0001" placeholder="77.2090">
                </div>

                <div class="form-group">
                    <label for="isDefault">
                        <input type="checkbox" id="isDefault" name="isDefault">
                        Set as Default Address
                    </label>
                </div>

                <div class="form-actions full-width">
                    <button type="submit" class="btn btn-primary">Add Address</button>
                    <a href="/addresses" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Just1Shop. All rights reserved.</p>
    </footer>
</body>
</html>
