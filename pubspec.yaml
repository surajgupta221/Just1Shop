name: just1shop
description: Village grocery delivery app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Firebase
  firebase_core: ^2.15.1
  firebase_auth: ^4.9.0
  cloud_firestore: ^4.9.1
  firebase_storage: ^11.2.6
  firebase_messaging: ^14.6.7
  
  # Payment
  razorpay_flutter: ^1.3.6
  
  # UI/UX
  cached_network_image: ^3.2.3
  image_picker: ^1.0.4
  carousel_slider: ^4.2.1
  shimmer: ^3.0.0
  lottie: ^2.6.0
  
  # Utilities
  shared_preferences: ^2.2.1
  connectivity_plus: ^4.0.2
  permission_handler: ^10.4.3
  intl: ^0.18.1
  uuid: ^3.0.7
  
  # Navigation
  go_router: ^10.1.2
  
  # Notifications
  flutter_local_notifications: ^15.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
